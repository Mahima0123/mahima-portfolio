<section id="contact" class="contact">

  <div class="contact-wrapper">

    <h2>Contact</h2>

    <p class="tagline">
      I’m currently open to software engineering and data engineering roles.
      Reach out if you think I’d be a good fit for your team.
    </p>

    <div class="contact-links">

      <a *ngFor="let link of contactLinks"
         [href]="link.url"
         target="_blank"
         class="contact-item">

        <img [src]="link.icon" [alt]="link.label" />
        <span>{{ link.label }}</span>

      </a>

    </div>

    <p class="footer-note">
      Based in the US • Open to Full-time Opportunities
    </p>

  </div>

</section>
